<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="트립 홀릭 TOPS 펜션 리뷰 작성">
  <title>리뷰 작성하기 | TRIP HOLIC</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="review-page review-write-page">
  <a class="skip-link" href="#review-write-main">본문 바로가기</a>

  <header class="review-write-header">
    <nav class="review-progress review-progress-compact" aria-label="리뷰 작성 페이지 이동">
      <a class="progress-label" href="./index.html">TRIP HOLIC</a>
      <span class="progress-track" aria-hidden="true"><span class="progress-fill"></span></span>
      <a class="progress-label is-active" href="./review.html">REAL REVIEW</a>
    </nav>
  </header>

  <main id="review-write-main" class="review-main">
    <section class="review-write-section" aria-labelledby="review-write-title">
      <div class="review-write-shell">
        <div class="review-write-heading">
          <p>REAL REVIEW</p>
          <h1 id="review-write-title">리뷰 작성하기</h1>
          <span>다녀온 TOPS 펜션의 경험을 간단히 남겨주세요.</span>
        </div>

        <form class="review-form" action="#" method="post">
          <label>
            <span>닉네임</span>
            <input type="text" name="nickname" placeholder="닉네임을 입력해주세요">
          </label>

          <label>
            <span>방문한 숙소명</span>
            <input type="text" name="stay" placeholder="숙소명을 입력해주세요">
          </label>

          <fieldset class="review-rating">
            <legend>별점 선택</legend>
            <div aria-label="별점 5점 만점">
              <button type="button" aria-label="1점">★</button>
              <button type="button" aria-label="2점">★</button>
              <button type="button" aria-label="3점">★</button>
              <button type="button" aria-label="4점">★</button>
              <button type="button" aria-label="5점">★</button>
            </div>
          </fieldset>

          <label>
            <span>리뷰 내용</span>
            <textarea name="review" rows="7" placeholder="숙소에서 좋았던 순간을 자유롭게 적어주세요"></textarea>
          </label>

          <div class="review-upload" role="button" tabindex="0" aria-label="사진 업로드">
            <strong>사진 업로드</strong>
            <span>숙소 인증샷을 여기에 추가해주세요</span>
          </div>

          <div class="review-form-actions">
            <button class="review-submit-button" type="submit">리뷰 등록하기</button>
            <a class="review-back-button" href="./review.html">돌아가기</a>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
